name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 还原依赖 (在 BH3 目录下执行)
      - name: Restore dependencies
        working-directory: ./BH3
        run: dotnet restore KianaBH/KianaBH.sln

      # 4. 编译并发布 Windows x64 (单文件，无运行时)
      - name: Publish win-x64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=true \
            -o ../publish/win-x64

      # 5. 编译并发布 Linux x64
      - name: Publish linux-x64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=true \
            -o ../publish/linux-x64

      # 6. 编译并发布 macOS x64
      - name: Publish osx-x64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishTrimmed=true \
            -o ../publish/osx-x64

      # 7. 上传所有平台的构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BH3-Server-Builds
          path: ./publish
          retention-days: 7
