name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码 (不指定 path，让代码直接在工作区根目录)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 使用绝对路径切换到项目目录
      - name: Change to project directory
        run: cd $GITHUB_WORKSPACE/KianaBH

      # 4. 还原依赖 (现在在 KianaBH 目录下，直接 restore 解决方案)
      - name: Restore dependencies
        run: dotnet restore KianaBH.sln

      # 5. 发布项目 (根据你的目录结构，启动项目在 Program 文件夹下)
      - name: Publish win-x64
        run: |
          dotnet publish $GITHUB_WORKSPACE/KianaBH/Program/Program.csproj \
            -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true

      - name: Publish linux-x64
        run: |
          dotnet publish $GITHUB_WORKSPACE/KianaBH/Program/Program.csproj \
            -c Release -r linux-x64 --self-contained false /p:PublishSingleFile=true

      - name: Publish linux-arm64
        run: |
          dotnet publish $GITHUB_WORKSPACE/KianaBH/Program/Program.csproj \
            -c Release -r linux-arm64 --self-contained false /p:PublishSingleFile=true

      # 6. 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KianaBH3-Artifacts
          path: |
            KianaBH/Program/bin/Release/net8.0/win-x64/publish/*
            KianaBH/Program/bin/Release/net8.0/linux-x64/publish/*
            KianaBH/Program/bin/Release/net8.0/linux-arm64/publish/*
          if-no-files-found: ignore
