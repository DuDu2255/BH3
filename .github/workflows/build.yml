name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码 (关键修改：添加 path: '.' 防止代码被放到嵌套文件夹里)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: '.'

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 还原依赖 (现在直接在根目录执行，路径就是 KianaBH/KianaBH3.csproj)
      - name: Restore dependencies
        run: dotnet restore KianaBH/KianaBH3.csproj

      # 4. 编译并发布 Windows x64
      - name: Publish win-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -o ./publish/win-x64

      # 5. 编译并发布 Linux x64
      - name: Publish linux-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o ./publish/linux-x64

      # 6. 编译并发布 Linux ARM64
      - name: Publish linux-arm64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained false \
            -o ./publish/linux-arm64

      # 7. 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KianaBH3-Server
          path: ./publish/
