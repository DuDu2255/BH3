name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # ===== Windows x64 =====
      - name: Publish win-x64
        run: |
          dotnet publish \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -o publish/win-x64

      # ===== Linux x64 =====
      - name: Publish linux-x64
        run: |
          dotnet publish \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o publish/linux-x64

      # ===== Linux ARM64 =====
      - name: Publish linux-arm64
        run: |
          dotnet publish \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -o publish/linux-arm64

      # ===== macOS x64 =====
      - name: Publish osx-x64
        run: |
          dotnet publish \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -o publish/osx-x64

      # ===== Upload =====
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BH3-Server-Builds
          path: publish/
