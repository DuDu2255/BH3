name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 还原依赖 (指定完整路径)
      - name: Restore dependencies
        run: dotnet restore KianaBH/KianaBH.csproj

      # 4. 编译并发布 Windows x64 (单文件)
      - name: Publish win-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o Release/win-x64

      # 5. 编译并发布 Linux x64
      - name: Publish linux-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o Release/linux-x64

      # 6. 编译并发布 Linux ARM64
      - name: Publish linux-arm64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r linux-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o Release/linux-arm64

      # 7. 编译并发布 macOS x64
      - name: Publish osx-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o Release/osx-x64

      # 8. 上传 Windows 产物
      - name: Upload win-x64
        uses: actions/upload-artifact@v4
        with:
          name: BH3-win-x64
          path: Release/win-x64

      # 9. 上传 Linux x64 产物
      - name: Upload linux-x64
        uses: actions/upload-artifact@v4
        with:
          name: BH3-linux-x64
          path: Release/linux-x64

      # 10. 上传 Linux ARM64 产物
      - name: Upload linux-arm64
        uses: actions/upload-artifact@v4
        with:
          name: BH3-linux-arm64
          path: Release/linux-arm64

      # 11. 上传 macOS 产物
      - name: Upload osx-x64
        uses: actions/upload-artifact@v4
        with:
          name: BH3-macos-x64
          path: Release/osx-x64
