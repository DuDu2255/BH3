name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 还原依赖 (针对 sln 或根目录的 csproj)
      - name: Restore dependencies
        run: dotnet restore KianaBH/KianaBH3.csproj

      # 4. 编译并发布 Windows x64 (单文件，无运行时)
      - name: Publish win-x64
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:PublishReadyToRun=true
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # 5. 上传编译好的程序作为 Artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BH3-Server-win-x64
          path: KianaBH/Program/bin/Release/net8.0/win-x64/publish/*.exe
          if-no-files-found: error
