name: .NET Build (KianaBH3)

permissions:
  actions: write
  contents: write

on:
  push:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  pull_request:
    branches: [ "clubfight" ]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 进入 BH3 目录，准备构建
      - name: Change to project directory
        run: cd BH3

      # 4. 还原依赖 (针对 Program.csproj)
      - name: Restore dependencies
        working-directory: ./BH3
        run: dotnet restore KianaBH/Program/Program.csproj

      # 5. 编译并发布 Windows x64 (单文件，无运行时)
      - name: Publish win-x64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o ./publish/win-x64

      # 6. 编译并发布 Linux x64
      - name: Publish linux-x64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o ./publish/linux-x64

      # 7. 编译并发布 Linux ARM64
      - name: Publish linux-arm64
        working-directory: ./BH3
        run: |
          dotnet publish KianaBH/Program/Program.csproj \
            --configuration Release \
            --runtime linux-arm64 \
            --self-contained false \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -o ./publish/linux-arm64

      # 8. 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KianaBH3-Build
          path: BH3/publish/**/*
